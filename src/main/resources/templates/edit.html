<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>编辑检查项 · Cron Sentinel</title>
    <style>
        :root {
            --bg: #0f1419; --card: #1a2029; --border: #2a313c;
            --text: #e6e6e6; --muted: #8a94a6;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg); color: var(--text); padding: 32px;
        }
        h1 { font-size: 22px; margin: 0 0 4px; }
        .sub { color: var(--muted); margin-bottom: 24px; font-size: 14px; }
        .nav a { color: #4aa3ff; text-decoration: none; font-size: 14px; }
        .nav a:hover { text-decoration: underline; }
        .card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 10px; padding: 20px 22px; max-width: 520px;
        }
        .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 16px; }
        .field label { font-size: 13px; color: var(--muted); }
        .field input {
            background: #0f1419; border: 1px solid var(--border); border-radius: 6px;
            color: var(--text); padding: 9px 11px; font-size: 14px; width: 100%;
        }
        .field input:disabled { color: var(--muted); }
        .field input:focus { outline: none; border-color: #4aa3ff; }
        .row { display: flex; gap: 12px; }
        .row .field { flex: 1; }
        .actions { display: flex; gap: 10px; margin-top: 8px; }
        button {
            cursor: pointer; border: none; border-radius: 6px; padding: 9px 18px;
            font-size: 14px; font-weight: 600; color: #fff;
        }
        .btn-primary { background: #2f6fed; }
        a.cancel {
            display: inline-flex; align-items: center; padding: 9px 18px;
            border-radius: 6px; background: #3a4250; color: #fff;
            text-decoration: none; font-size: 14px; font-weight: 600;
        }
        .hint { font-size: 12px; color: var(--muted); margin-top: 2px; }
    </style>
</head>
<body>
    <h1>编辑检查项</h1>
    <div class="sub nav"><a href="/">← 返回状态页</a></div>

    <div class="card">
        <form th:action="@{'/web/checks/' + ${check.id} + '/update'}" method="post">
            <div class="field">
                <label>名称</label>
                <input type="text" name="name" th:value="${check.name}" required/>
            </div>
            <div class="row">
                <div class="field">
                    <label>预期周期(秒)</label>
                    <input type="number" name="periodSeconds" min="1" th:value="${check.periodSeconds}" required/>
                </div>
                <div class="field">
                    <label>宽限期(秒)</label>
                    <input type="number" name="graceSeconds" min="0" th:value="${check.graceSeconds}"/>
                </div>
            </div>
            <div class="field">
                <label>告警邮箱</label>
                <input type="email" name="alertEmail" th:value="${check.alertEmail}" placeholder="you@example.com"/>
            </div>
            <div class="field">
                <label>Token（只读）</label>
                <input type="text" th:value="${check.token}" disabled/>
                <div class="hint">Token 不可修改；如需更换请删除后重建。</div>
            </div>
            <div class="actions">
                <button type="submit" class="btn-primary">保存</button>
                <a class="cancel" href="/">取消</a>
            </div>
        </form>
    </div>
</body>
</html>
